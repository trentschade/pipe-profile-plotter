<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipe Profile Plotter</title>
<link rel="stylesheet" href="/styles/main.css">
</head>
<body>

<!-- ═══════════════════════ SETUP ═══════════════════════ -->
<div id="setup-screen">
  <div class="card">
    <h1>Pipe Profile Plotter</h1>
    <p>Answer a few questions to generate an interactive pipe profile drawing.</p>

    <div class="fg">
      <label>Number of pipe segments</label>
      <input type="number" id="s-pipes" value="3" min="1" max="20">
    </div>
    <div class="fg">
      <label>Number of street crossings</label>
      <input type="number" id="s-streets" value="2" min="0" max="10">
    </div>
    <div class="fg">
      <label>Number of basements</label>
      <input type="number" id="s-bsmt" value="0" min="0" max="20">
    </div>
    <div class="fg">
      <label>Units</label>
      <select id="s-units">
        <option value="imp">Imperial (ft, in)</option>
        <option value="met">Metric (m, mm)</option>
      </select>
    </div>
    <div class="fg">
      <label>Optional drawing elements</label>
      <div class="chk-row">
        <label><input type="checkbox" id="s-gnd" checked> Street surface</label>
        <label><input type="checkbox" id="s-hgl"> HGL</label>
      </div>
    </div>

    <button class="btn-go" onclick="boot()">Generate New Profile →</button>
    <div id="resume-wrap"></div>
    <button class="btn-load" onclick="triggerLoad()">Load Existing Profile (JSON)</button>
  </div>
</div>

<!-- ═══════════════════════ MAIN ════════════════════════ -->
<div id="main-screen" style="display:none">
  <header>
    <h1>Pipe Profile Plotter</h1>
    <div class="hctl">
      <div class="utog">
        <button id="u-imp" onclick="setUnits('imp')">Imperial</button>
        <button id="u-met" onclick="setUnits('met')">Metric</button>
      </div>
      <div class="exp-wrap">
        <button class="hbtn" onclick="toggleExp(event)">Export ▾</button>
        <div class="exp-dd" id="exp-dd" hidden>
          <div class="exp-sep">Download as…</div>
          <button onclick="doExport('pptx')">&#128190; PowerPoint (.pptx)</button>
          <button onclick="doExport('png')">&#128444; PNG Image</button>
          <button onclick="doExport('svg')">&#128396; SVG Vector</button>
          <div class="exp-sep">Project file</div>
          <button onclick="doExport('json')">&#128190; Save JSON (.json)</button>
        </div>
      </div>
      <button class="hbtn" onclick="triggerLoad()">Load JSON</button>
      <button class="hbtn" onclick="goSetup()">New Profile</button>
      <input type="file" id="json-file-in" accept=".json" style="display:none" onchange="loadJSON(this)">
    </div>
  </header>

  <div id="drawing-container">
    <svg id="profile-svg"></svg>
  </div>

  <div id="data-panel">
    <div class="tabs" id="tabs"></div>
    <div id="tab-body"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
